name: finrl_real
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - ta-lib   # install via conda-forge BEFORE pip installing finrl -- pip alone usually fails to build TA-Lib's C extension
  - pip
  - pip:
    - finrl
    - gymnasium
    - stable-baselines3
    - stockstats
    - pyfolio-reloaded
    - alpaca-trade-api   # unused at runtime, but finrl/__init__.py imports it eagerly (see README "Gotchas")
    - yfinance           # unused at runtime (we supply our own data), same reason as above
