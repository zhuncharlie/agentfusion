name: ci-sandbox

on:
  pull_request:
    branches: [main]

jobs:
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install agentfusion
        run: pip install -e .

      - name: Run dummy_agent example
        run: python examples/dummy_agent.py

      - name: Run community_agent example
        run: python examples/community_agent.py
