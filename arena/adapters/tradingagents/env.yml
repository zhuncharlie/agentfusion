name: tradingagents_real
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - rust          # required for tiktoken compilation
  - pip
  - pip:
    # Install the REAL TauricResearch/TradingAgents — NOT PyPI's 'tradingagents' (Mai0313),
    # which is an unrelated package that will fail at runtime.
    - git+https://github.com/TauricResearch/TradingAgents.git
    # Pin tiktoken to a version with prebuilt cp312-linux wheels to skip Rust compilation
    - tiktoken==0.11.0
    # LangChain callback for token/cost tracking
    - langchain-community
